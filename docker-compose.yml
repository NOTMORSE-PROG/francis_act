version: "3"

services:
  flask1:
    build: .
    environment:
      - MONGO_URI=${MONGO_URI}
    volumes:
      - app_data:/app/data
    networks:
      - app_network

  flask2:
    build: .
    environment:
      - MONGO_URI=${MONGO_URI}
    volumes:
      - app_data:/app/data
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask1
      - flask2
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  app_data:
    driver: local
