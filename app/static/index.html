<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flask App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
    header { background: #16213e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { color: #e94560; font-size: 1.4rem; }
    #user-status { font-size: 0.9rem; color: #aaa; margin-right: 1rem; }
    .container { max-width: 780px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #16213e; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    h2 { color: #e94560; margin-bottom: 1.2rem; font-size: 1.1rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; }
    .tab { padding: 0.45rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; background: #0f3460; color: #eee; font-size: 0.9rem; }
    .tab.active { background: #e94560; }
    input[type=text], input[type=password] { width: 100%; padding: 0.55rem 0.75rem; margin-bottom: 0.75rem; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #eee; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #e94560; }
    .pass-wrap { position: relative; margin-bottom: 0.75rem; }
    .pass-wrap input { margin-bottom: 0; padding-right: 2.5rem; }
    .eye-btn { position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; color: #aaa; font-size: 1.1rem; line-height: 1; }
    .eye-btn:hover { color: #e94560; background: none; }
    button { padding: 0.5rem 1.4rem; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #c73652; }
    .btn-sec { background: #0f3460; }
    .btn-sec:hover { background: #0a2447; }
    .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.82rem; }
    .add-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .add-row input { margin-bottom: 0; flex: 1; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem 0.9rem; background: #1a1a2e; border-radius: 4px; margin-bottom: 0.5rem; font-size: 0.92rem; }
    .item-text strong { color: #e94560; }
    .item-text span { color: #aaa; margin-left: 0.4rem; font-size: 0.85rem; }
    .msg { padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; border-radius: 4px; font-size: 0.88rem; min-height: 1.5rem; }
    .ok  { background: #1a3a1a; color: #66bb6a; }
    .err { background: #3a1a1a; color: #ef5350; }
    .hidden { display: none; }
    .empty { color: #555; font-size: 0.9rem; padding: 0.5rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>Flask App</h1>
    <div style="display:flex;align-items:center;">
      <span id="user-status"></span>
      <button id="logout-btn" class="btn-sec hidden" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">
    <div id="auth-card" class="card">
      <div class="tabs">
        <button class="tab active" onclick="showTab('login')">Login</button>
        <button class="tab" onclick="showTab('register')">Register</button>
      </div>

      <div id="login-panel">
        <h2>Login</h2>
        <div id="login-msg" class="msg"></div>
        <input type="text" id="login-name" placeholder="Username" />
        <div class="pass-wrap">
          <input type="password" id="login-pass" placeholder="Password" />
          <button type="button" class="eye-btn" onclick="togglePass('login-pass', this)">&#128065;</button>
        </div>
        <button onclick="doLogin()">Login</button>
      </div>

      <div id="reg-panel" class="hidden">
        <h2>Register</h2>
        <div id="reg-msg" class="msg"></div>
        <input type="text" id="reg-name" placeholder="Username" />
        <div class="pass-wrap">
          <input type="password" id="reg-pass" placeholder="Password" />
          <button type="button" class="eye-btn" onclick="togglePass('reg-pass', this)">&#128065;</button>
        </div>
        <button onclick="doRegister()">Register</button>
      </div>
    </div>

    <div id="items-card" class="card hidden">
      <h2>Items</h2>
      <div id="items-msg" class="msg"></div>
      <div class="add-row">
        <input type="text" id="item-name" placeholder="Item name" />
        <input type="text" id="item-desc" placeholder="Description (optional)" />
        <button onclick="addItem()">Add</button>
      </div>
      <div id="items-list"></div>
    </div>
  </div>

  <script>
    function togglePass(id, btn) {
      const input = document.getElementById(id);
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.innerHTML = show ? '&#128064;' : '&#128065;';
    }

    function showTab(t) {
      document.getElementById('login-panel').classList.toggle('hidden', t !== 'login');
      document.getElementById('reg-panel').classList.toggle('hidden', t !== 'register');
      document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', i === (t === 'login' ? 0 : 1)));
    }

    function flash(id, text, ok) {
      const el = document.getElementById(id);
      el.className = 'msg ' + (ok ? 'ok' : 'err');
      el.textContent = text;
      setTimeout(() => { el.className = 'msg'; el.textContent = ''; }, 3000);
    }

    async function doLogin() {
      const name = document.getElementById('login-name').value.trim();
      const pass = document.getElementById('login-pass').value;
      const res  = await fetch('/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, password: pass}) });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('auth-card').classList.add('hidden');
        document.getElementById('items-card').classList.remove('hidden');
        document.getElementById('user-status').textContent = 'Logged in as ' + name;
        document.getElementById('logout-btn').classList.remove('hidden');
        loadItems();
      } else {
        flash('login-msg', data.error, false);
      }
    }

    async function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const pass = document.getElementById('reg-pass').value;
      const res  = await fetch('/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, password: pass}) });
      const data = await res.json();
      flash('reg-msg', data.message || data.error, !!data.message);
    }

    function logout() {
      document.getElementById('auth-card').classList.remove('hidden');
      document.getElementById('items-card').classList.add('hidden');
      document.getElementById('user-status').textContent = '';
      document.getElementById('logout-btn').classList.add('hidden');
    }

    async function loadItems() {
      const res   = await fetch('/items');
      const items = await res.json();
      const list  = document.getElementById('items-list');
      if (!items.length) { list.innerHTML = '<p class="empty">No items yet.</p>'; return; }
      list.innerHTML = items.map(i =>
        `<div class="item">
          <div class="item-text"><strong>${i.name}</strong>${i.desc ? '<span>— ' + i.desc + '</span>' : ''}</div>
          <button class="btn-sm" onclick="deleteItem('${i.id}')">Delete</button>
        </div>`
      ).join('');
    }

    async function addItem() {
      const name = document.getElementById('item-name').value.trim();
      const desc = document.getElementById('item-desc').value.trim();
      if (!name) return;
      const res = await fetch('/items', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, desc}) });
      if (res.ok) {
        document.getElementById('item-name').value = '';
        document.getElementById('item-desc').value = '';
        loadItems();
      } else {
        const data = await res.json();
        flash('items-msg', data.error, false);
      }
    }

    async function deleteItem(id) {
      await fetch('/items/' + id, { method: 'DELETE' });
      loadItems();
    }
  </script>
</body>
</html>
